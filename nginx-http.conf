# --- Django app (HTTP only — usar solo antes de obtener el certificado SSL) ---
# Una vez obtenido el cert con certbot, ejecutar `make nginx` de nuevo
# para activar la config HTTPS definitiva (nginx.conf).
server {
    listen 80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    client_max_body_size 20M;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias {{PROJECT_DIR}}/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias {{PROJECT_DIR}}/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:{{APP_PORT}};
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
