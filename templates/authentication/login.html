{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<script>
  if (localStorage.getItem('access')) {
    window.location.href = '/dashboard/';
  }
</script>

<style>
  .login-page {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, var(--cp-bg-start) 0%, var(--cp-bg-end) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--cp-surface);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--cp-surface-border);
    border-radius: 24px;
    padding: 48px 36px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .login-logo {
    width: 72px;
    height: 72px;
    background: var(--color-primary);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .login-logo img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }
  .login-subtitle {
    font-size: 0.875rem;
    color: var(--cp-text-lo);
    text-align: center;
    margin-top: -12px;
  }
  .login-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    background: var(--color-primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .login-btn:hover { opacity: 0.88; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--cp-text-dim);
    font-size: 0.75rem;
  }
  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--cp-surface-border);
  }
  .login-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .login-input {
    width: 100%;
    padding: 13px 16px;
    background: var(--cp-bg-end);
    border: 1px solid var(--cp-surface-border);
    border-radius: 12px;
    color: var(--cp-text-hi);
    font-size: 0.9375rem;
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--color-primary); }
  .login-input::placeholder { color: var(--cp-text-dim); }
  .login-btn-secondary {
    background: var(--cp-bg-end);
    border: 1px solid var(--cp-surface-border);
    color: var(--cp-text-hi);
    box-shadow: none;
  }
  .login-btn-secondary:hover { background: var(--cp-surface-border); opacity: 1; }
  .login-error {
    width: 100%;
    padding: 10px 14px;
    background: color-mix(in srgb, var(--cp-red) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--cp-red) 40%, transparent);
    border-radius: 10px;
    color: var(--cp-red);
    font-size: 0.8125rem;
    text-align: center;
    display: none;
  }
  .login-footer {
    font-size: 0.75rem;
    color: var(--cp-text-dim);
    text-align: center;
  }
  .login-footer span { color: var(--cp-text-lo); }
</style>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="{% static 'img/favicon.png' %}" alt="Logo">
    </div>

    <p class="login-subtitle">Control de jornada laboral</p>

    <a href="{% url 'authentication:oauth2_authorize' %}" class="login-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
      </svg>
      Entrar con Nextcloud
    </a>

    <div class="login-divider">o</div>

    <div class="login-form">
      <input id="login-username" class="login-input" type="text" placeholder="Usuario" autocomplete="username" autocapitalize="none">
      <input id="login-password" class="login-input" type="password" placeholder="Contraseña" autocomplete="current-password">
      <div id="login-error" class="login-error"></div>
      <button id="login-submit" class="login-btn login-btn-secondary" onclick="doLogin()">
        Iniciar sesión
      </button>
    </div>

    <p class="login-footer">Usa tu cuenta de <span>sky.redlinegs.com</span></p>

  </div>
</div>

<script>
  const usernameInput = document.getElementById('login-username');
  const passwordInput = document.getElementById('login-password');
  const submitBtn     = document.getElementById('login-submit');
  const errorBox      = document.getElementById('login-error');

  [usernameInput, passwordInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });

  async function doLogin() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    errorBox.style.display = 'none';

    if (!username || !password) {
      showError('Ingresa usuario y contraseña.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Ingresando…';

    try {
      const resp = await fetch('/api/auth/mobile-login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        showError(data.error || 'Usuario o contraseña incorrectos.');
        return;
      }

      localStorage.setItem('access', data.access);
      localStorage.setItem('refresh', data.refresh);
      window.location.href = data.solo_movil ? '/mobile/' : '/dashboard/';

    } catch {
      showError('Error de conexión. Intenta de nuevo.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Iniciar sesión';
    }
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }
</script>
{% endblock %}
