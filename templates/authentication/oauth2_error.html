{% extends "base.html" %}

{% block title %}Error de acceso — RedLine GS{% endblock %}

{% block content %}
<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-base-100 rounded-2xl shadow-xl overflow-hidden">
      <div class="h-1.5 bg-error w-full"></div>
      <div class="px-8 py-10 flex flex-col items-center gap-6">
        <div class="w-14 h-14 rounded-full bg-error/10 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="text-center">
          <h1 class="text-lg font-bold text-base-content">Error de autorización</h1>
          <p class="text-sm text-base-content/50 mt-2">{{ error }}</p>
        </div>
        <a href="{% url 'authentication:login' %}" class="btn btn-primary rounded-xl w-full">Intentar de nuevo</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
